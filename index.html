<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#eff6ff">
  <title>Pharmacy Sales & Shift Tracker</title>
  <style>
    :root {
      --boots-navy: #1e3a8a;
      --boots-blue: #005eb8;
      --aura-pink: #d81b60;
      --aura-purple: #8e24aa;
      --bg: transparent;
      --card: rgba(255, 255, 255, 0.45);
      --card2: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.6);
      --accent: #005eb8;
      --green: #16a34a;
      --red: #ef4444;
      --orange: #d97706;
      --purple: #9333ea;
      --text: #0f172a;
      --text2: #334155;
      --mono: 'Courier New', Courier, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%23eff6ff"><rect width="100" height="100"/></svg>') center/cover fixed;
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }
    .app-wrapper {
      width: 100%;
      max-width: 550px;
      min-height: 100dvh;
      background: rgba(239, 246, 255, 0.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-left: 1px solid rgba(255,255,255,0.4);
      border-right: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 30px rgba(0,0,0,0.08);
      position: relative;
      padding-bottom: 100px;
    }
    .glass-panel {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.04);
    }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title { font-family: 'Times New Roman', serif; font-style: italic; font-size: 24px; font-weight: 700; color: var(--boots-navy); }
    .store-badge { background: var(--boots-navy); color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .screen { display: none; padding: 0 0 20px; animation: fadeIn .25s; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .shift-card {
      margin: 16px 20px; padding: 18px; border-radius: 20px;
      background: rgba(255,255,255,0.7); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.8);
      display: flex; flex-direction: column; gap: 12px;
    }
    .shift-timer {
      font-size: 36px; font-weight: 900; font-family: var(--mono);
      color: var(--boots-navy); letter-spacing: 1px;
    }
    .shift-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--text2); }
    .shift-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 14px; border-radius: 14px; border: none;
      font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s;
      background: rgba(255,255,255,0.7); backdrop-filter: blur(5px);
      border: 1px solid var(--border); color: var(--boots-navy);
    }
    .btn.primary { background: var(--boots-navy); color: white; border: none; }
    .btn.danger { background: var(--aura-pink); color: white; border: none; }
    .btn:active { transform: scale(0.96); }

    .companion-row {
      display: flex; align-items: center; gap: 8px; margin: 5px 0;
    }
    .companion-row input {
      flex:1; background: rgba(255,255,255,0.6); border:1px solid var(--border);
      border-radius: 10px; padding: 10px; font-weight: 600;
    }

    .section-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--boots-navy); padding: 18px 20px 8px; }
    .entry-grid { margin: 12px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .entry-card { background: var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; backdrop-filter: blur(10px); }
    .entry-card label { font-size:10px; font-weight:800; color:var(--boots-navy); }
    .entry-card input { background:transparent; border:none; font-size:20px; font-weight:800; font-family:var(--mono); width:100%; outline:none; }
    .save-btn { margin:16px 20px; background:linear-gradient(145deg, var(--aura-pink), var(--aura-purple)); color:#fff; border:none; border-radius:14px; padding:16px; width:calc(100% - 40px); font-weight:800; }
    .bottom-nav { position:absolute; bottom:0; width:100%; background:rgba(255,255,255,0.75); backdrop-filter:blur(20px); display:flex; border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom,15px); }
    .nav-btn { flex:1; padding:10px 0; text-align:center; font-size:10px; font-weight:800; color:var(--text3); background:none; border:none; }
    .nav-btn.active { color:var(--boots-navy); }
    .toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:var(--green); color:#fff; padding:10px 22px; border-radius:50px; z-index:999; opacity:0; transition:.3s; }
    .toast.show { opacity:1; }
    .history-card { margin:8px 20px; background:var(--card); border-radius:14px; padding:14px; display:flex; justify-content:space-between; cursor:pointer; }
    .kpi-row { display:flex; gap:10px; padding:0 20px; overflow-x:auto; }
    .kpi-chip { background:var(--card); border-radius:14px; padding:12px 16px; min-width:100px; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="topbar">
    <div class="topbar-title">Boots <span style="font-weight:600;">Tracker</span></div>
    <div class="store-badge" id="storeBadge">DXB T3</div>
  </div>
  <div class="toast" id="toast">✓ Saved</div>

  <!-- DASHBOARD -->
  <div class="screen active" id="screen-dashboard">
    <div class="shift-card" id="shiftWidget">
      <div style="display:flex; justify-content:space-between;">
        <span style="font-weight:800; color:var(--boots-navy);">⏱️ SHIFT TIMER</span>
        <span style="font-size:12px;" id="shiftStatus">Not started</span>
      </div>
      <div class="shift-timer" id="liveTimer">00:00:00</div>
      <div class="shift-meta">
        <span id="shiftInLabel">In: --:--</span>
        <span id="shiftOutLabel">Out: --:--</span>
        <span id="shiftTotal">0h 0m</span>
      </div>
      <div class="companion-row">
        <input type="text" id="companionInput" placeholder="👤 Staff companion (optional)">
      </div>
      <div class="shift-actions">
        <button class="btn primary" id="btnStartShift" onclick="handleStartShift()">▶ START</button>
        <button class="btn danger" id="btnEndShift" onclick="endShift()" disabled>⏹ END</button>
      </div>
      <button class="btn" id="btnRestartManual" style="display:none; margin-top:6px;" onclick="restartOrManual()">🔄 Restart / ✏️ Manual</button>
    </div>
    <div class="section-label">TODAY'S SUMMARY</div>
    <div class="kpi-row" id="dashKpis"></div>
    <div style="padding:0 20px;"><button class="btn" onclick="showScreen('today')">📝 Enter Sales Data</button></div>
  </div>

  <!-- ENTRY SCREEN -->
  <div class="screen" id="screen-today">
    <div class="section-label">SALES ENTRY</div>
    <div class="entry-grid">
      <div class="entry-card"><label>💰 SALE (AED)</label><input type="number" id="inp-sale" placeholder="0"></div>
      <div class="entry-card"><label>🧴 NO7</label><input type="number" id="inp-no7" placeholder="0"></div>
      <div class="entry-card"><label>🧾 TRN</label><input type="number" id="inp-trn" placeholder="0"></div>
      <div class="entry-card"><label>👥 FOOTFALL</label><input type="number" id="inp-footfall" placeholder="0"></div>
    </div>
    <button class="save-btn" onclick="saveSales()">💾 Save Sales</button>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="section-label">SHIFT & SALES HISTORY</div>
    <div id="historyList"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showScreen('dashboard')">🏠 Home</button>
    <button class="nav-btn" id="nav-today" onclick="showScreen('today')">✏️ Entry</button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')">🗂️ History</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'pharmacy_tracker_v2';
  let appData = {};
  let shiftInterval = null;
  let currentScreen = 'dashboard';

  // Load data
  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { appData = JSON.parse(saved); } catch(e){ appData = {}; }
    }
    if (!appData.shifts) appData.shifts = {};
    if (!appData.sales) appData.sales = {};
    if (!appData.settings) appData.settings = { storeName: 'BOOTS DXB T3' };
    if (!appData.activeShift) appData.activeShift = null; // { startTime, companion, manualStart }
    document.getElementById('storeBadge').textContent = appData.settings.storeName || 'DXB T3';
    document.getElementById('companionInput').value = appData.activeShift?.companion || '';
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }

  function todayKey() {
    const d = new Date();
    return d.toISOString().slice(0,10);
  }

  function formatTime(date) {
    return date.toTimeString().slice(0,5);
  }

  function getShiftState() {
    const active = appData.activeShift;
    if (!active) return { running: false, elapsed: 0, start: null };
    const now = Date.now();
    const start = active.startTime;
    const elapsed = Math.max(0, Math.floor((now - start) / 1000));
    return { running: true, elapsed, start: new Date(start), companion: active.companion, manualStart: active.manualStart };
  }

  function updateShiftUI() {
    const state = getShiftState();
    const timerEl = document.getElementById('liveTimer');
    const statusEl = document.getElementById('shiftStatus');
    const inLabel = document.getElementById('shiftInLabel');
    const outLabel = document.getElementById('shiftOutLabel');
    const totalEl = document.getElementById('shiftTotal');
    const btnStart = document.getElementById('btnStartShift');
    const btnEnd = document.getElementById('btnEndShift');
    const btnRestart = document.getElementById('btnRestartManual');

    if (state.running) {
      const hrs = Math.floor(state.elapsed / 3600);
      const mins = Math.floor((state.elapsed % 3600) / 60);
      const secs = state.elapsed % 60;
      timerEl.textContent = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      statusEl.textContent = '🔵 Active';
      inLabel.textContent = `In: ${formatTime(state.start)}`;
      outLabel.textContent = 'Out: --:--';
      totalEl.textContent = `${hrs}h ${mins}m`;
      btnStart.style.display = 'none';
      btnEnd.disabled = false;
      btnRestart.style.display = 'block';
    } else {
      timerEl.textContent = '00:00:00';
      statusEl.textContent = '⚪ Idle';
      if (appData.activeShift?.endTime) {
        const end = new Date(appData.activeShift.endTime);
        outLabel.textContent = `Out: ${formatTime(end)}`;
        const dur = Math.floor((end - new Date(appData.activeShift.startTime))/1000);
        totalEl.textContent = `${Math.floor(dur/3600)}h ${Math.floor((dur%3600)/60)}m`;
      } else {
        outLabel.textContent = 'Out: --:--';
        totalEl.textContent = '0h 0m';
      }
      btnStart.style.display = 'block';
      btnEnd.disabled = true;
      btnRestart.style.display = 'none';
      inLabel.textContent = appData.activeShift?.startTime ? `In: ${formatTime(new Date(appData.activeShift.startTime))}` : 'In: --:--';
    }
    renderDashboardKPIs();
  }

  function startShiftTimer() {
    if (shiftInterval) clearInterval(shiftInterval);
    shiftInterval = setInterval(updateShiftUI, 1000);
  }

  function handleStartShift() {
    const companion = document.getElementById('companionInput').value.trim();
    const now = Date.now();
    appData.activeShift = {
      startTime: now,
      companion: companion || '',
      manualStart: false,
      date: todayKey()
    };
    saveData();
    updateShiftUI();
    startShiftTimer();
    showToast('Shift started!');
  }

  function endShift() {
    if (!appData.activeShift || !appData.activeShift.startTime) return;
    const now = Date.now();
    const start = appData.activeShift.startTime;
    const durationSec = Math.floor((now - start) / 1000);
    
    // Save completed shift to history
    const shiftRecord = {
      startTime: start,
      endTime: now,
      duration: durationSec,
      companion: appData.activeShift.companion || '',
      date: todayKey()
    };
    const key = todayKey();
    if (!appData.shifts[key]) appData.shifts[key] = [];
    appData.shifts[key].push(shiftRecord);
    
    // Clear active shift
    appData.activeShift = null;
    saveData();
    updateShiftUI();
    if (shiftInterval) clearInterval(shiftInterval);
    showToast('Shift ended & saved.');
    renderHistory();
  }

  function restartOrManual() {
    const choice = confirm('Press OK to RESTART shift from now, or Cancel to ENTER MANUAL start time.');
    if (choice) {
      // Restart: clear current and start fresh
      if (shiftInterval) clearInterval(shiftInterval);
      appData.activeShift = null;
      saveData();
      handleStartShift();
    } else {
      // Manual time entry
      const manualTime = prompt('Enter shift START time (HH:MM, 24h format):', '09:00');
      if (!manualTime) return;
      const [h, m] = manualTime.split(':').map(Number);
      if (isNaN(h) || isNaN(m) || h<0 || h>23 || m<0 || m>59) {
        alert('Invalid time format.'); return;
      }
      const now = new Date();
      const manualDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
      if (manualDate > now) {
        alert('Start time cannot be in the future.'); return;
      }
      const companion = document.getElementById('companionInput').value.trim();
      appData.activeShift = {
        startTime: manualDate.getTime(),
        companion: companion || '',
        manualStart: true,
        date: todayKey()
      };
      saveData();
      updateShiftUI();
      startShiftTimer();
      showToast(`Manual start set to ${manualTime}. Clock running.`);
    }
  }

  function saveSales() {
    const sale = parseFloat(document.getElementById('inp-sale').value) || 0;
    const no7 = parseFloat(document.getElementById('inp-no7').value) || 0;
    const trn = parseInt(document.getElementById('inp-trn').value) || 0;
    const footfall = parseInt(document.getElementById('inp-footfall').value) || 0;
    const key = todayKey();
    if (!appData.sales[key]) appData.sales[key] = {};
    appData.sales[key] = { sale, no7, trn, footfall, atv: trn>0 ? sale/trn : 0 };
    saveData();
    showToast('Sales saved!');
    renderDashboardKPIs();
  }

  function renderDashboardKPIs() {
    const key = todayKey();
    const sales = appData.sales[key] || {};
    const shiftState = getShiftState();
    let shiftHours = 0;
    if (shiftState.running) shiftHours = shiftState.elapsed / 3600;
    else if (appData.activeShift?.endTime) {
      shiftHours = (appData.activeShift.endTime - appData.activeShift.startTime) / 3600000;
    }
    const container = document.getElementById('dashKpis');
    container.innerHTML = `
      <div class="kpi-chip"><div>💰 Sales</div><strong>AED ${(sales.sale||0).toLocaleString()}</strong></div>
      <div class="kpi-chip"><div>🧴 NO7</div><strong>${sales.no7||0}</strong></div>
      <div class="kpi-chip"><div>🧾 TRN</div><strong>${sales.trn||0}</strong></div>
      <div class="kpi-chip"><div>⏱️ Shift</div><strong>${shiftHours.toFixed(1)}h</strong></div>
    `;
  }

  function renderHistory() {
    const container = document.getElementById('historyList');
    if (!container) return;
    const allDates = Object.keys(appData.shifts).sort().reverse();
    let html = '';
    allDates.forEach(date => {
      const shifts = appData.shifts[date] || [];
      const sales = appData.sales[date] || {};
      shifts.forEach((shift, idx) => {
        const start = new Date(shift.startTime);
        const end = new Date(shift.endTime);
        const durMin = Math.floor(shift.duration / 60);
        html += `<div class="history-card" onclick="editHistory('${date}',${idx})">
          <div><strong>${date}</strong> ${formatTime(start)} - ${formatTime(end)} (${Math.floor(durMin/60)}h ${durMin%60}m)</div>
          <div>👤 ${shift.companion || '—'} | AED ${(sales.sale||0).toLocaleString()}</div>
        </div>`;
      });
    });
    container.innerHTML = html || '<p style="padding:20px;">No history yet.</p>';
  }

  function editHistory(date, idx) {
    alert('History detail view (demo). Shift saved.');
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + name).classList.add('active');
    currentScreen = name;
    if (name === 'history') renderHistory();
    if (name === 'dashboard') renderDashboardKPIs();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Auto-save at midnight & cloud simulation
  function scheduleMidnightReset() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24,0,0,0);
    const msUntilMidnight = midnight - now;
    setTimeout(() => {
      if (appData.activeShift && appData.activeShift.date !== todayKey()) {
        endShift(); // auto end shift if crosses midnight
      }
      saveData();
      showToast('Auto-saved at midnight');
      scheduleMidnightReset();
    }, msUntilMidnight);
  }

  window.onload = () => {
    loadData();
    updateShiftUI();
    if (appData.activeShift) startShiftTimer();
    renderDashboardKPIs();
    scheduleMidnightReset();
  };
</script>
</body>
</html>
