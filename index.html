<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pharmacy Sales Widget</title>
<style>
/* === LIGHT NAVY & GLASSMORPHISM THEME === */
:root {
  --light-navy: #1e3a8a;
  --light-navy-bg: #eff6ff;
  --glass-bg: rgba(255, 255, 255, 0.6);
  --glass-border: rgba(255, 255, 255, 0.8);
  --boots-blue: #005eb8;
  --aura-pink: #d81b60;
  --aura-purple: #8e24aa;
  --accent2: #4ba3e3;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --purple: #a855f7;
  --text: #0f172a;
  --text2: #475569;
  --text3: #64748b;
  --mono: 'Courier New', Courier, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  --serif: 'Times New Roman', Times, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--sans);
  background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
  color: var(--text);
  /* Using dvh to avoid taskbar hiding issues on laptops */
  min-height: 100dvh; 
  display: flex;
  justify-content: center;
}

/* Desktop Widget Container */
.app-container {
  width: 100%;
  max-width: 450px; /* Keeps it looking like a widget on desktop */
  background: var(--light-navy-bg);
  min-height: 100dvh;
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
  /* Extra padding at the bottom so it does not go under the taskbar */
  padding-bottom: 90px; 
  overflow-x: hidden;
}

/* Glassmorphism Classes */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(30, 58, 138, 0.05);
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(239, 246, 255, 0.85);
  backdrop-filter: blur(12px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar-title { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--light-navy); }
.topbar-date { font-size: 12px; color: var(--text2); font-family: var(--mono); }
.store-badge { background: var(--light-navy); color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }

.screen { display: none; padding: 0 0 20px; animation: fadeIn .25s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); padding: 18px 20px 8px; }

/* Aura Gradient for Specific Elements */
.aura-gradient {
  background: linear-gradient(145deg, var(--aura-pink), var(--aura-purple));
  color: #fff !important;
  border: none;
}

.date-scroll { display: flex; gap: 8px; padding: 6px 20px 2px; overflow-x: auto; scrollbar-width: none; }
.date-scroll::-webkit-scrollbar { display: none; }
.date-chip { flex-shrink: 0; padding: 8px 14px; text-align: center; cursor: pointer; transition: all .15s; min-width: 56px; }
.date-chip.active { background: var(--light-navy); color: #fff; border-color: var(--light-navy); }
.date-chip .day-name { font-size: 10px; font-weight: 600; letter-spacing: .5px; }
.date-chip .day-num { font-size: 18px; font-weight: 700; line-height: 1.1; margin-top: 2px; }

.entry-grid { margin: 12px 20px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.entry-card { padding: 12px 14px; transition: border-color .15s; }
.entry-card label { font-size: 10px; font-weight: 700; color: var(--light-navy); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px; }
.entry-card input { background: none; border: none; outline: none; color: var(--text); font-size: 22px; font-weight: 700; font-family: var(--mono); width: 100%; }
.entry-card input::placeholder { color: #94a3b8; }
.entry-card .calc-row { margin-top: 4px; font-size: 11px; color: var(--text2); font-family: var(--mono); }

/* Aura coloured buttons */
.save-btn { margin: 16px 20px 0; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; width: calc(100% - 40px); cursor: pointer; transition: all .15s; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3); }
.save-btn:active { transform: scale(.97); box-shadow: none; }

.history-card { margin: 8px 20px 0; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.history-card:hover { border-color: var(--light-navy); }
.h-date { font-size: 13px; font-weight: 700; color: var(--light-navy); }
.h-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.h-sales { font-size: 18px; font-weight: 700; font-family: var(--mono); text-align: right; }

.settings-group { margin: 10px 20px 0; overflow: hidden; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(0,0,0,0.05); }
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 14px; font-weight: 600; color: var(--light-navy); }
.settings-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.settings-input { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 6px 10px; color: var(--text); font-size: 14px; font-weight: 600; font-family: var(--mono); width: 110px; text-align: right; outline: none; }

.bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; z-index: 200; background: rgba(239, 246, 255, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.6); display: flex; padding-bottom: 15px; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0 8px; cursor: pointer; border: none; background: none; color: var(--text3); font-weight: 600; }
.nav-btn.active { color: var(--light-navy); }
.nav-btn .nav-icon { font-size: 22px; margin-bottom: 3px; }

.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--green); color: #fff; padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 700; z-index: 999; opacity: 0; transition: all .3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.cloud-status { text-align: center; font-size: 11px; color: var(--text2); margin-top: 10px; }
</style>
</head>
<body>

<div class="app-container">
  <div class="topbar">
    <div>
      <div class="topbar-title">Widget <span style="font-weight:400;color:var(--text3)">Tracker</span></div>
      <div class="topbar-date" id="todayStr"></div>
    </div>
    <div class="store-badge" id="storeBadge">STORE</div>
  </div>

  <div class="toast" id="toast">✓ Saved successfully!</div>

  <div class="screen active" id="screen-today">
    <div class="date-scroll" id="dateChips"></div>
    <div class="section-label">EDIT / ENTER DATA</div>
    
    <div class="entry-grid" id="entryGrid">
      <div class="entry-card glass-card">
        <label>💰 SALE (AED)</label>
        <input type="number" id="inp-sale" placeholder="0.00">
      </div>
      <div class="entry-card glass-card">
        <label>🧴 NO7 SALES</label>
        <input type="number" id="inp-no7" placeholder="0.00">
      </div>
      <div class="entry-card glass-card">
        <label>🧾 TRANSACTIONS</label>
        <input type="number" id="inp-trn" placeholder="0">
      </div>
      <div class="entry-card glass-card">
        <label>👥 FOOTFALL</label>
        <input type="number" id="inp-footfall" placeholder="0">
      </div>
    </div>
    <button class="save-btn aura-gradient" onclick="saveData()">💾 Save & Sync to Cloud</button>
    <div class="cloud-status" id="syncStatus">Status: Up to date</div>
  </div>

  <div class="screen" id="screen-history">
    <div class="section-label">PREVIOUS ENTRIES (CLICK TO EDIT)</div>
    <div id="historyList"></div>
  </div>

  <div class="screen" id="screen-settings">
    <div class="section-label">STORE CONFIG</div>
    <div class="settings-group glass-card">
      <div class="settings-row">
        <div><div class="settings-label">Store Name</div></div>
        <input class="settings-input" id="set-store" placeholder="BOOTS DXB T3" oninput="saveSetting('storeName',this.value)">
      </div>
    </div>
    
    <div class="section-label">CLOUD DATA</div>
    <div class="settings-group glass-card">
      <div class="settings-row" style="cursor:pointer" onclick="forceCloudSync()">
        <div><div class="settings-label" style="color:var(--aura-purple)">☁️ Force Cloud Sync</div><div class="settings-sub">Push local data to database</div></div>
        <div style="color:var(--aura-pink);font-size:18px">›</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="showScreen('today')"><span class="nav-icon">✏️</span>Entry</button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')"><span class="nav-icon">🗂️</span>History</button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')"><span class="nav-icon">⚙️</span>Settings</button>
  </div>
</div>

<script>
// --- CLOUD MOCKUP SYSTEM ---
// You will replace these functions with your actual database code (Firebase, etc.)
let salesData = {};
let settings = {};
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let selectedDate = new Date().toISOString().slice(0,10);

function simulateCloudSave(data) {
  return new Promise(resolve => setTimeout(() => {
    localStorage.setItem('cloud_backup', JSON.stringify(data));
    resolve('Success');
  }, 800));
}

function simulateCloudFetch() {
  return new Promise(resolve => setTimeout(() => {
    const data = JSON.parse(localStorage.getItem('cloud_backup')) || {};
    resolve(data);
  }, 800));
}

// --- APP LOGIC ---
function init() {
  const now = new Date();
  document.getElementById('todayStr').textContent = now.toDateString();
  salesData = JSON.parse(localStorage.getItem('local_data')) || {};
  settings = JSON.parse(localStorage.getItem('local_settings')) || {};
  document.getElementById('storeBadge').textContent = settings.storeName || 'BOOTS DXB';
  document.getElementById('set-store').value = settings.storeName || '';
  
  buildDateChips();
  loadFormData();
}

function buildDateChips() {
  const c = document.getElementById('dateChips'); 
  c.innerHTML = '';
  const today = new Date();
  for(let i=6; i>=0; i--) {
    const d = new Date(today); 
    d.setDate(today.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const chip = document.createElement('div');
    chip.className = 'date-chip glass-card' + (key === selectedDate ? ' active' : '');
    chip.innerHTML = `<div class="day-name">${DAYS_SHORT[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>`;
    chip.onclick = () => { selectedDate = key; buildDateChips(); loadFormData(); };
    c.appendChild(chip);
  }
}

function loadFormData() {
  const data = salesData[selectedDate] || {};
  document.getElementById('inp-sale').value = data.sale || '';
  document.getElementById('inp-no7').value = data.no7 || '';
  document.getElementById('inp-trn').value = data.trn || '';
  document.getElementById('inp-footfall').value = data.footfall || '';
}

async function saveData() {
  const stat = document.getElementById('syncStatus');
  stat.textContent = 'Status: Saving to cloud...';
  
  if(!salesData[selectedDate]) salesData[selectedDate] = {};
  salesData[selectedDate].sale = parseFloat(document.getElementById('inp-sale').value) || 0;
  salesData[selectedDate].no7 = parseFloat(document.getElementById('inp-no7').value) || 0;
  salesData[selectedDate].trn = parseFloat(document.getElementById('inp-trn').value) || 0;
  salesData[selectedDate].footfall = parseFloat(document.getElementById('inp-footfall').value) || 0;
  
  localStorage.setItem('local_data', JSON.stringify(salesData));
  
  // Cloud sync trigger
  await simulateCloudSave(salesData);
  
  stat.textContent = 'Status: Up to date';
  showToast('✓ Saved & Synced!');
  refreshHistory();
}

function saveSetting(key, val) {
  settings[key] = val;
  localStorage.setItem('local_settings', JSON.stringify(settings));
  document.getElementById('storeBadge').textContent = settings.storeName || 'BOOTS DXB';
}

async function forceCloudSync() {
  showToast('⏳ Syncing to cloud...');
  await simulateCloudSave(salesData);
  showToast('✓ Cloud Sync Complete!');
}

function refreshHistory() {
  const c = document.getElementById('historyList');
  const keys = Object.keys(salesData).sort().reverse();
  c.innerHTML = '';
  
  if(keys.length === 0) {
    c.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">No data yet.</div>';
    return;
  }
  
  keys.forEach(key => {
    const d = salesData[key];
    const card = document.createElement('div');
    card.className = 'history-card glass-card';
    card.innerHTML = `
      <div>
        <div class="h-date">${key}</div>
        <div class="h-sub">TRN: ${d.trn || 0} · No7: ${d.no7 || 0}</div>
      </div>
      <div class="h-sales">AED ${d.sale || 0}</div>
    `;
    // Click to edit functionality
    card.onclick = () => { 
      selectedDate = key; 
      buildDateChips(); 
      showScreen('today'); 
      loadFormData(); 
    };
    c.appendChild(card);
  });
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  
  if(name === 'history') refreshHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
